# =============================================================================
# LiteLLM Proxy 配置
#
# 模型命名约定：
#   - ``model_name``：暴露给 wikforge / 客户端的虚拟模型名
#   - ``litellm_params.model``：实际后端模型，``<provider>/<model>`` 格式
#
# 修改本文件后需要重启 litellm 容器：``docker compose restart litellm``。
# 后续也可以通过 Admin UI（http://localhost:4000/ui）动态添加模型，
# 通过 UI 添加的会写入 PostgreSQL，重启后保留。
# =============================================================================

model_list:
  # ---------------------------------------------------------------------------
  # Chat 模型 - 通过 CPA 网关路由
  # ---------------------------------------------------------------------------
  - model_name: gpt-5.5
    litellm_params:
      model: openai/gpt-5.5
      api_base: https://litellm-upstream/v1
      api_key: os.environ/CPA_API_KEY

  # ---------------------------------------------------------------------------
  # Embedding 模型 - 通过阿里云百炼（DashScope OpenAI 兼容协议）
  # 在 wikforge 启动前，请在 .env 中填入 DASHSCOPE_API_KEY
  # ---------------------------------------------------------------------------
  - model_name: text-embedding-v4
    litellm_params:
      model: openai/text-embedding-v4
      api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/DASHSCOPE_API_KEY
      # 百炼 v4 默认输出 1024 维, 与 Qdrant document_chunks.dense.size 对齐。
      # 如需更高质量可改 dimensions: 1536/2048/3072 (但需同步改 Qdrant collection)。

  # v3 保留为后备(质量略低但更便宜兼容性更稳),如需启用从 wikforge .env 改 EMBEDDING_MODEL=text-embedding-v3 即可
  - model_name: text-embedding-v3
    litellm_params:
      model: openai/text-embedding-v3
      api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/DASHSCOPE_API_KEY

litellm_settings:
  # 缓存（Redis）：复用 wikforge-redis，使用独立 DB 以隔离 wikforge 业务键。
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    db: 1

  # 默认请求超时（秒）。wikforge 后端有自己的超时控制，这里设大一点避免双重超时。
  request_timeout: 120

  # 失败重试：单上游失败时本地重试 2 次再返回错误。
  num_retries: 2

  drop_params: true                     # CPA 不识别的参数自动丢弃，避免 400

general_settings:
  # 启用 Admin UI 的 SSO/简单凭证登录由环境变量 UI_USERNAME / UI_PASSWORD 控制。
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true   # 通过 UI 新增的模型持久化到数据库
  store_prompts_in_spend_logs: false  # 出于隐私考虑不存原文 prompt
