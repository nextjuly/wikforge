# =============================================================================
# LiteLLM Proxy 配置 (按平台分组)
#
# 配置组织方式:
# 1. 顶部 ``_platforms`` 段定义每个上游平台的 base URL + API Key
#    (用 YAML 锚点 ``&xxx`` 标记, 后面 model_list 通过 ``<<: *xxx`` 引用)
# 2. ``model_list`` 段声明每个虚拟模型挂在哪个平台 + 上游真实 model id
#
# 改 API Key / base URL 只需要改 _platforms 一处, 不必每个 model 改。
# 新增模型只需要复制一行 ``model_name + <<: *platform + model: openai/<id>``。
#
# 修改后重启: ``docker compose restart litellm``
# 也可以通过 Admin UI (http://localhost:4000/ui) 临时添加, 数据库会持久化。
# =============================================================================


# ─────────────────────────────────────────────────────────────────────────
# 平台凭证 (YAML 锚点, 不会被 LiteLLM 解析为模型, 仅供下面引用)
# ─────────────────────────────────────────────────────────────────────────
_platforms:
  # CPA 网关: 提供 OpenAI / Claude / Qwen / GLM / DeepSeek / Kimi 等多家模型
  # base URL 与 API key 都从 .env 注入,避免硬编码网关域名 (个人隐私 + 内网安全)
  cpa: &cpa
    api_base: os.environ/CPA_API_BASE
    api_key: os.environ/CPA_API_KEY

  # 阿里云百炼 (DashScope OpenAI 兼容协议): 提供 Embedding / 通义千问系列
  # 公网公开端点,可硬编码;但为统一仍走 env 注入,方便后期切到代理
  dashscope: &dashscope
    api_base: os.environ/DASHSCOPE_API_BASE
    api_key: os.environ/DASHSCOPE_API_KEY


# ─────────────────────────────────────────────────────────────────────────
# 暴露给 wikforge 的虚拟模型清单
# ─────────────────────────────────────────────────────────────────────────
model_list:
  # ─── Chat 模型 (CPA 平台) ───────────────────────────────────────────
  - model_name: gpt-5.5
    litellm_params:
      <<: *cpa
      model: openai/gpt-5.5

  - model_name: gpt-5.4
    litellm_params:
      <<: *cpa
      model: openai/gpt-5.4

  - model_name: gpt-5.4-mini
    litellm_params:
      <<: *cpa
      model: openai/gpt-5.4-mini

  - model_name: gpt-5.3-codex
    litellm_params:
      <<: *cpa
      model: openai/gpt-5.3-codex

  - model_name: glm-5.1
    litellm_params:
      <<: *cpa
      model: openai/glm-5.1

  - model_name: kimi-k2.6
    litellm_params:
      <<: *cpa
      model: openai/kimi-k2.6

  - model_name: deepseek-v4-pro
    litellm_params:
      <<: *cpa
      model: openai/deepseek-v4-pro

  # ─── Embedding 模型 (DashScope 平台) ────────────────────────────────
  - model_name: text-embedding-v4
    litellm_params:
      <<: *dashscope
      model: openai/text-embedding-v4

  - model_name: text-embedding-v3
    litellm_params:
      <<: *dashscope
      model: openai/text-embedding-v3

  # ─── Vision 模型 (DashScope 平台) ───────────────────────────────────
  # 用于 wikforge UniversalParser (L3 LLM 兜底): 扫描版 PDF / 复杂版面
  # 调用方式: messages 含 {"type":"image_url", "image_url":...}
  # qwen-vl-plus: 性价比高, 适合一般版面理解 (~0.008 元/张)
  # qwen-vl-max:  能力最强, 适合复杂表格 / 公式 / 手写 (~0.02 元/张)
  - model_name: qwen-vl-plus
    litellm_params:
      <<: *dashscope
      model: openai/qwen-vl-plus

  - model_name: qwen-vl-max
    litellm_params:
      <<: *dashscope
      model: openai/qwen-vl-max


# ─────────────────────────────────────────────────────────────────────────
# 全局设置
# ─────────────────────────────────────────────────────────────────────────
litellm_settings:
  # 缓存(Redis): 复用 wikforge-redis, 用 DB 1 隔离 wikforge 业务键
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    db: 1

  # 单次请求超时 (秒). wikforge 后端有自己的超时控制, 这里设大点避免双重超时
  request_timeout: 120

  # 单上游失败本地重试次数
  num_retries: 2

  # 上游不识别的参数自动丢弃 (如 gpt-5 系列不接受 temperature=0.1)
  drop_params: true


general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true              # UI 新增的模型持久化到数据库
  store_prompts_in_spend_logs: false   # 不存原文 prompt
